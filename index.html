<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album Slider</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:tahoma;
}

.swiper{
    width:100%;
    max-width:900px;
    padding:50px 0;
}

.swiper-slide{
    width:280px;
    height:420px;
    border-radius:25px;
    overflow:hidden;
    background:#fff;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.swiper-slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="swiper mySwiper">
    <div class="swiper-wrapper">

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1011/600/900">
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1015/600/900">
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1016/600/900">
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1020/600/900">
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1024/600/900">
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

new Swiper(".mySwiper", {

    effect: "coverflow",
    grabCursor: true,
    centeredSlides: true,
    slidesPerView: "auto",

    coverflowEffect: {
        rotate: 0,
        stretch: 40,
        depth: 150,
        modifier: 1.5,
        scale: 0.85,
        slideShadows: false
    },

    loop: true

});

</script>

</body>
</html>
