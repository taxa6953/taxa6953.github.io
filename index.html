<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxury Album</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    background:
    linear-gradient(
        180deg,
        #F8F4ED 0%,
        #EFE7DB 100%
    );

    font-family:tahoma;

    overflow:hidden;
}

/* عنوان */

.album-title{

    text-align:center;

    margin-top:30px;

    color:#5a4b42;

    font-size:42px;

    letter-spacing:8px;

    font-family:serif;

    user-select:none;
}

/* اسلایدر */

.swiper{

    width:100%;

    max-width:1500px;

    margin-top:10px;

    padding:60px 0 120px;
}

/* کارت */

.swiper-slide{

    width:500px;

    height:700px;

    position:relative;

    background:#fff;

    padding:14px;

    border-radius:30px;

    box-shadow:
    0 25px 60px rgba(0,0,0,.10);

    overflow:visible;
}

/* قاب سفید */

.swiper-slide::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:30px;

    border:2px solid rgba(90,75,66,.08);

    pointer-events:none;
}

/* عکس */

.swiper-slide img{

    width:100%;

    height:100%;

    object-fit:cover;

    border-radius:20px;
}

/* دکمه */

.download-btn{

    position:absolute;

    bottom:-35px;

    left:50%;

    transform:translateX(-50%);

    width:70px;

    height:70px;

    border:none;

    border-radius:50%;

    background:#fff;

    text-decoration:none;

    color:#5a4b42;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:28px;

    box-shadow:
    0 12px 30px rgba(0,0,0,.15);

    transition:.3s;
}

.download-btn:hover{

    transform:
    translateX(-50%)
    translateY(-5px);

    box-shadow:
    0 18px 40px rgba(0,0,0,.20);
}

/* متن زیر */

.caption{

    position:absolute;

    top:18px;

    left:25px;

    background:rgba(255,255,255,.85);

    padding:8px 16px;

    border-radius:20px;

    color:#5a4b42;

    font-size:14px;

    backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<div class="album-title">
    MEMORIES
</div>

<div class="swiper mySwiper">

    <div class="swiper-wrapper">

        <div class="swiper-slide">

            <div class="caption">Photo 01</div>

            <img src="https://picsum.photos/id/1011/800/1200">

            <a href="https://picsum.photos/id/1011/1600/2400"
               class="download-btn"
               target="_blank">
                ⬇
            </a>

        </div>

        <div class="swiper-slide">

            <div class="caption">Photo 02</div>

            <img src="https://picsum.photos/id/1015/800/1200">

            <a href="https://picsum.photos/id/1015/1600/2400"
               class="download-btn"
               target="_blank">
                ⬇
            </a>

        </div>

        <div class="swiper-slide">

            <div class="caption">Photo 03</div>

            <img src="https://picsum.photos/id/1016/800/1200">

            <a href="https://picsum.photos/id/1016/1600/2400"
               class="download-btn"
               target="_blank">
                ⬇
            </a>

        </div>

        <div class="swiper-slide">

            <div class="caption">Photo 04</div>

            <img src="https://picsum.photos/id/1020/800/1200">

            <a href="https://picsum.photos/id/1020/1600/2400"
               class="download-btn"
               target="_blank">
                ⬇
            </a>

        </div>

        <div class="swiper-slide">

            <div class="caption">Photo 05</div>

            <img src="https://picsum.photos/id/1024/800/1200">

            <a href="https://picsum.photos/id/1024/1600/2400"
               class="download-btn"
               target="_blank">
                ⬇
            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

new Swiper(".mySwiper", {

    effect:"coverflow",

    centeredSlides:true,

    slidesPerView:"auto",

    grabCursor:true,

    loop:true,

    speed:700,

    coverflowEffect:{

        rotate:0,

        stretch:80,

        depth:250,

        modifier:2,

        scale:0.82,

        slideShadows:false

    }

});

</script>

</body>
</html>
