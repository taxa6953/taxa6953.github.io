<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Image</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    background:#000;
}

/* تصویر زمینه */
.bg{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

/* المان کلیک‌شونده */
.hotspot{
    position:absolute;

    /* تنظیم موقعیت */
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);

    /* تنظیم اندازه */
    font-size:70px;

    /* تنظیم شفافیت */
    opacity:0.8;

    cursor:pointer;
    user-select:none;
}

.hotspot:hover{
    opacity:1;
}
</style>

</head>
<body>

<img src="07_17_2026_Zawa.jpeg" class="bg" alt="Background">

<div class="hotspot" onclick="showMessage()">🎵</div>

<script>
function showMessage(){
    alert("روی استیکر کلیک شد!");
}
</script>

</body>
</html>
