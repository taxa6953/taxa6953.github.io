<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برای عارفه ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
overflow:hidden;
background:black;
}

.background{

width:100vw;
height:100vh;

background:
linear-gradient(
rgba(0,0,0,.25),
rgba(0,0,0,.45)
),
url("hero.jpg");

background-size:cover;
background-position:center;

position:relative;
}

/* نقاط قابل کلیک */

.hotspot{

position:absolute;

width:28px;
height:28px;

border-radius:50%;

background:white;

box-shadow:
0 0 10px white,
0 0 25px white;

cursor:pointer;

transform:translate(-50%,-50%);

transition:.3s;
}

.hotspot:hover{

transform:
translate(-50%,-50%)
scale(1.25);

}

/* پاکت */

.envelope{

width:90px;
height:70px;

background:#f3e3bc;

border-radius:12px;

box-shadow:
0 0 20px rgba(255,255,255,.3);

}

/* متن ثابت */

.quote{

position:absolute;

right:8%;
top:45%;

color:white;

font-size:42px;
line-height:2;

text-shadow:
0 0 15px rgba(0,0,0,.7);

}

.title{

position:absolute;

top:8%;
left:50%;

transform:translateX(-50%);

color:white;

font-size:60px;

text-shadow:
0 0 20px rgba(0,0,0,.7);

}

/* پنجره */

#popup{

position:fixed;
inset:0;

background:rgba(0,0,0,.85);

display:none;

justify-content:center;
align-items:center;

z-index:999;
}

.card{

width:340px;

background:white;

padding:25px;

border-radius:20px;

text-align:center;

position:relative;
}

.card h2{

margin-bottom:15px;

}

#close{

position:absolute;

left:15px;
top:10px;

font-size:22px;

cursor:pointer;

border:none;
background:none;
}

/* عکس مودال */

#photoModal{

position:fixed;
inset:0;

display:none;

justify-content:center;
align-items:center;

background:rgba(0,0,0,.92);

z-index:9999;
}

#photoModal img{

max-width:90%;
max-height:90%;

border-radius:20px;
}

#closePhoto{

position:absolute;

top:25px;
right:35px;

font-size:45px;

color:white;

cursor:pointer;
}

</style>
</head>

<body>

<div class="background">

<h1 class="title">
برای عارفه ❤️
</h1>

<div class="quote">
برای بعضی آدم‌ها...
<br>
هیچ جمله‌ای کافی نیست.
</div>

<!-- آغاز آشنایی -->

<div class="hotspot"

style="
top:30%;
left:15%;
"

data-title="آغاز آشنایی"

data-text="24 اردیبهشت 1405">
</div>

<!-- اولین خاطره -->

<div class="hotspot"

style="
top:48%;
left:17%;
"

data-title="اولین خاطره مهم"

data-text="15 خرداد 1405">
</div>

<!-- تولد -->

<div class="hotspot"

style="
top:66%;
left:15%;
"

data-title="تولد عارفه"

data-text="16 دی">
</div>

<!-- پاکت -->

<div

class="hotspot envelope"

id="letter"

style="
top:80%;
left:50%;
">
</div>

</div>

<!-- مودال اطلاعات -->

<div id="popup">

<div class="card">

<button id="close">
✕
</button>

<h2 id="popupTitle"></h2>

<p id="popupText"></p>

</div>

</div>

<!-- مودال عکس -->

<div id="photoModal">

<span id="closePhoto">
✕
</span>

<img src="letter-photo.jpg">

</div>

<script>

const popup =
document.getElementById("popup");

const title =
document.getElementById("popupTitle");

const text =
document.getElementById("popupText");

document
.querySelectorAll(".hotspot")
.forEach(item=>{

if(item.id==="letter") return;

item.onclick=()=>{

title.innerText =
item.dataset.title;

text.innerText =
item.dataset.text;

popup.style.display="flex";

};

});

document
.getElementById("close")
.onclick=()=>{

popup.style.display="none";

};

popup.onclick=(e)=>{

if(e.target===popup){

popup.style.display="none";

}

};

/* پاکت */

const photo =
document.getElementById("photoModal");

document
.getElementById("letter")
.onclick=()=>{

photo.style.display="flex";

};

document
.getElementById("closePhoto")
.onclick=()=>{

photo.style.display="none";

};

photo.onclick=(e)=>{

if(e.target===photo){

photo.style.display="none";

}

};

</script>

</body>
</html>
