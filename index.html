<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Album Slider</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding-top:40px;

background:
linear-gradient(
180deg,
#F5F0E8,
#EEE7DB
);

background-size:cover;
}
.swiper{
    width:100%;
    max-width:1400px;
    padding:80px 0;
}

.swiper-slide{

    width:500px;
    height:620px;

    border-radius:35px;
    overflow:hidden;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 30px 80px rgba(0,0,0,.45);
}

.swiper-slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}
    .download-btn{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);

    padding:12px 30px;

    background:rgba(20,20,20,.85);
    color:white;

    text-decoration:none;
    font-size:15px;
    font-weight:600;

    border-radius:50px;
    border:1px solid rgba(255,255,255,.2);

    backdrop-filter:blur(10px);

    transition:.3s;

    z-index:100;
}

.download-btn:hover{
    background:#fff;
    color:#111;
}
</style>
</head>

<body>

<div class="swiper mySwiper">
    <div class="swiper-wrapper">

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1011/600/900" alt="">
            <a href="https://picsum.photos/id/1011/1200/1800"
               download
               class="download-btn"> دانلود تصویر
            </a>
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1015/600/900" alt="">
            <a href="https://picsum.photos/id/1015/1200/1800"
               download
               class="download-btn">
                ⬇ دانلود تصویر
            </a>
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1016/600/900" alt="">
            <a href="https://picsum.photos/id/1016/1200/1800"
               download
               class="download-btn">
                ⬇ دانلود تصویر
            </a>
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1020/600/900" alt="">
            <a href="https://picsum.photos/id/1020/1200/1800"
               download
               class="download-btn">
                ⬇ دانلود تصویر
            </a>
        </div>

        <div class="swiper-slide">
            <img src="https://picsum.photos/id/1024/600/900" alt="">
            <a href="https://picsum.photos/id/1024/1200/1800"
               download
               class="download-btn">
                ⬇ دانلود تصویر
            </a>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

new Swiper(".mySwiper", {

    effect:"coverflow",

    centeredSlides:true,

    slidesPerView:"auto",

    grabCursor:true,

    loop:true,

    coverflowEffect:{

        rotate:0,

        stretch:100,

        depth:250,

        modifier:2,

        scale:0.8,

        slideShadows:false

    }

});
</script>

</body>
</html>
