<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برای عارفه ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<section class="hero">

    <div class="top-icons">
        <div>☰</div>
        <div>♫</div>
    </div>

    <div class="title">
        <h1>برای عارفه</h1>
        <span>❤</span>
    </div>

    <div class="timeline">

        <div class="item">
            <div class="icon">♡</div>
            <div>
                <h3>آغاز آشنایی</h3>
                <p>24 اردیبهشت 1405</p>
                <small id="daysTogether"></small>
            </div>
        </div>

        <div class="line"></div>

        <div class="item">
            <div class="icon">✩</div>
            <div>
                <h3>روز اولین خاطره</h3>
                <p>15 خرداد 1405</p>
            </div>
        </div>

        <div class="line"></div>

        <div class="item">
            <div class="icon">🎂</div>
            <div>
                <h3>تولد عارفه</h3>
                <p>16 دی</p>
                <small id="birthdayLeft"></small>
            </div>
        </div>

    </div>

    <div class="quote">

        <h2>
            برای بعضی آدم‌ها...
            <br>
            هیچ جمله‌ای کافی نیست.
        </h2>

    </div>

    <div class="envelope-wrapper">

        <div class="envelope" id="openEnvelope">

            <div class="flap"></div>
            <div class="body"></div>

            <div class="heart">
                ❤
            </div>

        </div>

        <button>
            نامه‌ای برای عارفه
        </button>

        <span>
            برای باز کردن کلیک کن
        </span>

    </div>

    <div class="footer">
        A R E F E H
    </div>

</section>

<div class="modal" id="modal">

    <span id="closeModal">×</span>

    <img src="images/letter-photo.jpg">

</div>

<script src="script.js"></script>

</body>
</html>
